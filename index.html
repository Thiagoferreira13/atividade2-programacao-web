<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiago Azevedo — Página Pessoal</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0f14;
            color: #e8ecf0;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 2.5rem;
        }

        header {
            text-align: center;
            opacity: 0;
            transform: translateY(16px);
            animation: up .5s ease forwards;
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: #4a5568;
            margin-bottom: .9rem;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -.02em;
            margin-bottom: .8rem;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: .8rem;
            color: #4a5568;
            line-height: 1.7;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 700px;
            opacity: 0;
            transform: translateY(16px);
            animation: up .5s ease .18s forwards;
        }

        .card {
            background: #13171f;
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 14px;
            padding: 1.75rem;
            text-decoration: none;
            color: #e8ecf0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color .2s, transform .2s;
        }

        .card:hover { transform: translateY(-4px); }
        .card-bs:hover   { border-color: #7c4dff; }
        .card-bulma:hover { border-color: #00d1b2; }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .25rem .6rem;
            border-radius: 999px;
            border: 1px solid;
        }

        .badge-bs    { color: #7c4dff; border-color: #7c4dff; background: rgba(124,77,255,.1); }
        .badge-bulma { color: #00d1b2; border-color: #00d1b2; background: rgba(0,209,178,.1); }

        .arrow {
            color: #4a5568;
            font-size: 1rem;
            transition: transform .2s, color .2s;
        }

        .card:hover .arrow { transform: translate(3px,-3px); }
        .card-bs:hover .arrow    { color: #7c4dff; }
        .card-bulma:hover .arrow { color: #00d1b2; }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -.01em;
        }

        .card-desc {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: #4a5568;
            line-height: 1.75;
        }

        footer {
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem;
            color: #2d3748;
            letter-spacing: .08em;
            opacity: 0;
            animation: up .5s ease .35s forwards;
        }

        @keyframes up {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <p class="eyebrow">GAC116 · Programação Web · 2026/1</p>
    <h1>Thiago Ferreira<br>Azevedo</h1>
    <p class="subtitle">Atividade Prática 2 — Escolha a versão da página.</p>
</header>

<div class="cards">
    <a class="card card-bs" href="pagina_pessoal_bootstrap/pagina_bootstrap.html" target="_blank">
        <div class="card-top">
            <span class="badge badge-bs">Framework #1</span>
            <span class="arrow">↗</span>
        </div>
        <p class="card-title">Bootstrap</p>
        <p class="card-desc">Versão desenvolvida com Bootstrap 5.</p>
    </a>

    <a class="card card-bulma" href="pagina_pessoal_Bulma/pagina_bulma.html" target="_blank">
        <div class="card-top">
            <span class="badge badge-bulma">Framework #2</span>
            <span class="arrow">↗</span>
        </div>
        <p class="card-title">Bulma</p>
        <p class="card-desc">Versão desenvolvida com Bulma 0.9.4</p>
    </a>
</div>

<footer>UFLA · Ciência da Computação · Thiago Ferreira Azevedo</footer>

</body>
</html>
